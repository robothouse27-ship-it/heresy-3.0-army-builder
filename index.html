function adjTrk(uid,field,dir,max,wrap){
  const st=PLAY[uid]; if(!st) return;
  if(dir==="+"){st[field]=Math.min(max,(st[field]??0)+1);}
  else{
    st[field]=Math.max(0,(st[field]??0)-1);
    // a model that runs out of wounds is removed; the next one steps up to full
    if(wrap&&field==="wounds"&&st.wounds<=0&&st.models>1){st.models--;st.wounds=wrap;}
  }
  savePlay(); renderPlay();
}
function bindPlay(){
  const root=document.getElementById("play");
  root.querySelectorAll("[data-pm]").forEach(b=>b.onclick=()=>{const[uid,dir]=b.dataset.pm.split(":");
    const e=find(uid);adjTrk(uid,"models",dir,e?e.size:1);});
  root.querySelectorAll("[data-pw]").forEach(b=>b.onclick=()=>{const[uid,dir]=b.dataset.pw.split(":");
    const e=find(uid);const mw=e?maxWounds(unitMap[e.id]):1;adjTrk(uid,"wounds",dir,mw,mw);});
  root.querySelectorAll("[data-ptok]").forEach(t=>t.onclick=()=>{const[uid,tok]=t.dataset.ptok.split(":");
    const st=PLAY[uid]||(PLAY[uid]={tokens:{}});if(!st.tokens)st.tokens={};
    st.tokens[tok]=st.tokens[tok]?false:1;savePlay();renderPlay();});  // toggle on at level 1
  root.querySelectorAll("[data-ptn]").forEach(b=>b.onclick=()=>{const[uid,tok,dir]=b.dataset.ptn.split("|");
    const st=PLAY[uid];if(!st||!st.tokens)return;let v=typeof st.tokens[tok]==="number"?st.tokens[tok]:1;
    st.tokens[tok]=Math.max(1,Math.min(3,v+(dir==="+"?1:-1)));savePlay();renderPlay();});
  root.querySelectorAll("[data-react]").forEach(b=>b.onclick=()=>{const uid=b.dataset.react;
    const st=PLAY[uid]||(PLAY[uid]={});st.reacted=!st.reacted;savePlay();renderPlay();});
  root.querySelectorAll("[data-arx]").forEach(b=>b.onclick=()=>{const army=PLAY.__army||(PLAY.__army={});
    const op=b.dataset.arx;
    if(op==="reset")army.reactions=reactionAllotment(R.limit);
    else army.reactions=Math.max(0,Math.min(99,(army.reactions??0)+(op==="+"?1:-1)));
    savePlay();renderPlay();});
  root.querySelectorAll("[data-detail]").forEach(b=>b.onclick=()=>showDetail(b.dataset.detail));
  const rb=root.querySelector("#playReset");
  if(rb)rb.onclick=()=>{if(confirm("Reset all unit trackers to full strength?")){PLAY={};savePlay();renderPlay();}};
  const ss=root.querySelector("#playSort");
  if(ss)ss.onchange=()=>{PLAY.__sort=ss.value;savePlay();renderPlay();};
  initPlayDrag(root.querySelector(".pgrid"));
}
// Pointer-based drag reorder (works for mouse + touch). Dragging from a card's
// grip live-reorders the grid; on release the new order is saved as a custom sort.
function dragAfter(grid,x,y,exclude){
  let closest=null,best=Infinity,after=false;
  grid.querySelectorAll(".pcard").forEach(c=>{ if(c===exclude) return;
    const r=c.getBoundingClientRect(), cx=r.left+r.width/2, cy=r.top+r.height/2;
    const d=Math.hypot(x-cx,y-cy);
    if(d<best){best=d;closest=c;after=(Math.abs(y-cy)>r.height*0.4)?(y>cy):(x>cx);}
  });
  return {closest,after};
}
function initPlayDrag(grid){
  if(!grid) return;
  grid.querySelectorAll(".pgrip").forEach(h=>{
    h.addEventListener("pointerdown",e=>{
      const card=h.closest(".pcard"); if(!card) return;
      e.preventDefault(); card.classList.add("dragging");
      const move=ev=>{ const {closest,after}=dragAfter(grid,ev.clientX,ev.clientY,card);
        if(closest){ after?closest.after(card):closest.before(card); } };
      const up=()=>{ card.classList.remove("dragging");
        window.removeEventListener("pointermove",move); window.removeEventListener("pointerup",up);
        PLAY.__order=[...grid.querySelectorAll(".pcard")].map(c=>c.dataset.uid);
        PLAY.__sort="custom"; savePlay(); renderPlay(); };
      window.addEventListener("pointermove",move); window.addEventListener("pointerup",up);
    });
  });
}

// ---------- glossary / clickable terms ----------
let GLOSS={}, tipData=[];
function gkey(s){return (s||"").toLowerCase().replace(/\([^)]*\)/g,"").replace(/[^a-z0-9]+/g," ").trim();}
function buildGloss(){
  GLOSS={}; const g=G.glossary||{};
  const add=(cat,obj)=>{for(const k in (obj||{})){const key=gkey(k);if(key&&!GLOSS[key])GLOSS[key]={name:k,desc:obj[k],cat};}};
  add("Special Rule",g.specialRules); add("Core Rule",g.coreRules); add("Wargear",g.wargear); add("Trait",g.traits);
}
// resolve the [World-Rune] bracket-trait placeholder to the roster's chosen rune name
function resolveWorldRuneTrait(t){
  if(t!=="[World-Rune]") return t;
  if(!R.worldRune) return t;
  const w=(DET.worldRunes||[]).find(x=>x.key===R.worldRune);
  return w?w.name:t;
}
function esc(s){return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function paraHtml(t){return esc(t).replace(/\n/g,"<br>");}
function tipRef(title,body,sub){const i=tipData.length;tipData.push({title,body,sub:sub||""});return i;}
// rule/trait term: clickable only if a definition exists
function term(name){
  const e=GLOSS[gkey(name)];
  if(!e) return esc(name);
  return `<span class="term" data-tip="${tipRef(e.name,paraHtml(e.desc),e.cat)}">${esc(name)}</span>`;
}
// wargear/weapon term: weapon profile if known, else glossary, else plain
function gearTerm(name){
  const w=weaponMap[slug(name)], e=GLOSS[gkey(name)];
  if(w) return `<span class="term" data-tip="${tipRef(name,weaponBody(w),w.category==="ranged"?"Ranged Weapon":"Melee Weapon")}">${esc(name)}</span>`;
  if(e) return `<span class="term" data-tip="${tipRef(e.name,paraHtml(e.desc),e.cat)}">${esc(name)}</span>`;
  return esc(name);
}
function splitTopComma(s){ // split on commas NOT inside parentheses, e.g. "Shock (Stun, Suppressed)"
  const out=[]; let depth=0,cur="";
  for(const ch of (s||"")){ if(ch==="(")depth++; else if(ch===")")depth=Math.max(0,depth-1);
    if(ch===","&&depth===0){ if(cur.trim())out.push(cur.trim()); cur=""; } else cur+=ch; }
  if(cur.trim())out.push(cur.trim()); return out;
}
function commaTerms(str){return splitTopComma(str).map(term).join(", ");}
function weaponBody(w){
  const isR=w.category==="ranged";
  const rows=isR?[["Range",w.R],["Firepower",w.FP],["RS",w.RS],["AP",w.AP],["Damage",w.D]]
                :[["Attacks",w.A],["Strength",w.S],["AP",w.AP],["Damage",w.D],["Init",w.I]];
  let h=`<table class="kv">`+rows.filter(r=>r[1]!==undefined&&r[1]!=="").map(r=>
    `<tr><td>${r[0]}</td><td>${esc(String(r[1]))}</td></tr>`).join("")+`</table>`;
  const sr=(w["Special Rules"]||"").trim();
  if(sr) h+=`<div class="tipsub">Special rules</div><div>${commaTerms(sr)}</div>`;
  const tr=(w.Traits||"").trim();
  if(tr) h+=`<div class="tipsub">Traits</div><div>${esc(tr)}</div>`;
  return h;
}
function showTip(idx){

  document.getElementById("tipcard").innerHTML=

    `<h3>${esc(d.title)}</h3><div class="tipbody">${d.body}</div>`;

}

// ---------- detail modal ----------
function showDetail(id){
  const u=unitMap[id]; if(!u) return;
  // tipData is append-only (shared with the roster's inline terms) so indices stay valid
  // whether the click lands in the datasheet or back in the roster entry.
  const keys=statHeaders(u.profiles);
  let html=`<button class="x" id="mx">×</button><h2>${u.name}</h2><div class="slot">${u.slot}${u.baseCost?' · '+u.baseCost:''}</div>`;
  if(u.composition) html+=`<div style="font-size:12.5px;color:var(--muted)">${u.composition}</div>`;
  (u.sizeRules||[]).forEach(s=>html+=`<div class="optnote">${s.replace(/\n/g,'<br>')}</div>`);
  if(u.profiles.length){
    html+=`<table class="stat"><tr><th></th>${keys.map(k=>`<th>${k}</th>`).join("")}</tr>`;
    u.profiles.forEach(p=>{html+=`<tr><td class="nm">${p.name}</td>${keys.map(k=>`<td>${p.stats[k]||"–"}</td>`).join("")}</tr>`;});
    html+=`</table>`;
  }
  // wargear & rules (terms are clickable when a definition exists)
  const blk=(title,obj,fmt)=>{
    if(!obj||!Object.keys(obj).length) return "";
    let s=`<div class="sec"><h3>${title}</h3>`;
    Object.keys(obj).forEach(k=>{
      if(k!=="_") s+=`<div style="font-size:12px;color:var(--teal);margin-top:5px">${esc(k)}</div>`;
      s+="<ul>"+obj[k].map(x=>`<li>${fmt(x)}</li>`).join("")+"</ul>";
    });
    return s+"</div>";
  };
  // Wargear — collapse models that share an identical loadout, render inline
  const wg=u.wargear||{}, wkeys=Object.keys(wg).filter(k=>wg[k]&&wg[k].length);
  if(wkeys.length){
    html+=`<div class="sec"><h3>Wargear</h3>`;
    const groups={};
    wkeys.forEach(k=>{const sig=JSON.stringify(wg[k]);(groups[sig]=groups[sig]||{models:[],items:wg[k]}).models.push(k);});
    const lone=Object.keys(groups).length===1;
    Object.values(groups).forEach(g=>{
      const noLabel=g.models[0]==="_"||(lone&&g.models.length===1);
      const lbl=noLabel?"":`<span style="color:var(--teal)">${g.models.map(esc).join(", ")}:</span> `;
      html+=`<div class="wline">${lbl}${g.items.map(gearTerm).join(", ")}</div>`;
    });
    html+=`</div>`;
  }
  // Special Rules — inline clickable list (compact, scannable)
  const srl=Object.values(u.specialRules||{}).flat().filter(x=>x&&x!=="None");
  if(srl.length) html+=`<div class="sec"><h3>Special Rules</h3><div class="wline">${srl.map(term).join(", ")}</div></div>`;
  // resolved weapon stats
  const wnames=new Set();
  Object.values(u.wargear||{}).flat().forEach(w=>wnames.add(w));
  const found=[...wnames].map(n=>weaponMap[slug(n)]).filter(Boolean);
  if(found.length){
    html+=`<div class="sec"><h3>Weapon Profiles</h3><table class="wtbl"><tr><th class="l">Weapon</th><th>R</th><th>FP/A</th><th>S/RS</th><th>AP</th><th>D</th><th class="l">Special</th></tr>`;
    found.forEach(w=>{
      const isR=w.category==="ranged";
      const nm=w["Ranged Weapon"]||w["Melee Weapon"]||w.id;
      html+=`<tr><td class="l">${gearTerm(nm)}</td>
        <td>${isR?(w.R??'–'):'—'}</td><td>${isR?(w.FP??'–'):(w.A??'–')}</td>
        <td>${isR?(w.RS??'–'):(w.S??'–')}</td><td>${w.AP??'–'}</td><td>${w.D??'–'}</td>
        <td class="l" style="font-size:11px">${commaTerms(w["Special Rules"]||"")}</td></tr>`;
    });
    html+=`</table></div>`;
  }
  if(u.traits&&u.traits.length) html+=`<div class="sec"><h3>Traits</h3>${u.traits.map(t=>`<span class="pill">${term(resolveWorldRuneTrait(t))}</span>`).join("")}</div>`;
  if(u.types&&Object.keys(u.types).length){
    html+=`<div class="sec"><h3>Type</h3>`+Object.entries(u.types).map(([k,v])=>
      `<div style="font-size:12px"><span style="color:var(--muted)">${k==='_'?'':k+': '}</span>${Array.isArray(v)?v.join(', '):v}</div>`).join("")+`</div>`;
  }
  if(u.options&&u.options.length) html+=`<div class="sec"><h3>Options</h3><ul>${u.options.map(o=>`<li>${o}</li>`).join("")}</ul></div>`;
  if(u.lore&&u.lore.length) html+=`<div class="sec"><h3>Lore</h3><div class="lore">${u.lore.join("\n\n")}</div></div>`;
  document.getElementById("sheet").innerHTML=html;
  document.getElementById("modal").classList.add("show");
  document.getElementById("mx").onclick=closeModal;
}

// ---------- persistence ----------
function serialize(){
  return {v:2,name:R.name,army:curArmy,limit:R.limit,open:!!R.open,worldRune:R.worldRune||"",
    detachments:R.detachments.map(d=>({tid:d.tid,
      extra:d.slots.filter(s=>s.addedBy).map(s=>({role:s.role,addedBy:s.addedBy})),
      slots:d.slots.map(s=>s.entry?{id:s.entry.id,size:s.entry.size,addons:s.entry.addons,
        ups:s.entry.ups,gear:s.entry.gear,adjust:s.entry.adjust,tag:s.entry.tag,note:s.entry.note,
        prime:s.entry.prime||"",primeAddRole:s.entry.primeAddRole||""}:null)}))};
}
function applyEntry(e,sd){Object.assign(e,{size:sd.size??e.size,addons:sd.addons||e.addons,
  ups:(sd.ups&&sd.ups.length===e.ups.length)?sd.ups:e.ups,
  gear:sd.gear||[],adjust:sd.adjust||0,tag:sd.tag||"",note:sd.note||"",
  prime:sd.prime||"",primeAddRole:sd.primeAddRole||"",open:false});clampUps(e);}
function hydrate(data){
  R={name:data.name||"",limit:data.limit||2000,open:!!data.open,worldRune:data.worldRune||"",detachments:[]};
  if(R.open){
    const od=openDetachment();
    ((data.detachments&&data.detachments[0]&&data.detachments[0].slots)||[]).forEach(sd=>{
      if(!sd)return;const e=makeEntry(sd.id);if(e){applyEntry(e,sd);od.slots.push({role:"Open",entry:e});}});
    R.detachments=[od]; render(); return;
  }
  if(data.detachments){
    data.detachments.forEach(dd=>{
      const det=newDetachment(dd.tid); if(!det) return;
      (dd.extra||[]).forEach(x=>det.slots.push({role:x.role,entry:null,prime:false,addedBy:x.addedBy}));
      (dd.slots||[]).forEach((sd,i)=>{if(sd&&det.slots[i]){const e=makeEntry(sd.id);if(e){applyEntry(e,sd);det.slots[i].entry=e;}}});
      R.detachments.push(det);
    });
    if(!R.detachments.length && DET.primary) R.detachments.push(newDetachment(DET.primary.id));
  } else if(data.units){ // legacy v1 flat roster
    if(DET.primary) R.detachments.push(newDetachment(DET.primary.id));
    data.units.forEach(d=>{const u=unitMap[d.id];if(!u)return;const slot=findOpenSlot(u.slot,d.id);
      const e=makeEntry(d.id);if(e){applyEntry(e,d);if(slot)slot.entry=e;}});
  } else if(DET.primary){R.detachments.push(newDetachment(DET.primary.id));}
  render();
}

// Load a saved/imported/shared roster, switching to its army first when needed so
// unit ids resolve against the right dataset (mismatch warns instead of silently dropping).
async function loadRoster(data){
  if(!data) return;
  const want=data.army;
  if(want && want!==LOADED_ARMY){
    if(ARMY_MAP[want] && (want==="asuryani"||ARMY_MAP[want].data)){
      try{ await selectArmy(want); }catch(e){ flash("Couldn't switch to "+((ARMY_MAP[want]||{}).name||want)); }
    }else{
      flash("⚠ List is for "+((ARMY_MAP[want]||{}).name||want)+" — loading into "+((ARMY_MAP[LOADED_ARMY]||{}).name||LOADED_ARMY));
    }
  }
  hydrate(data);
}

  r.onload=()=>{
    let data; try{ data=JSON.parse(r.result); }catch(x){ alert("That file isn't valid JSON."); return; }
    if(data && data.type==="backup" && data.lists){           // a full backup → merge into saved lists
      const all=saved(); let n=0;
      Object.keys(data.lists).forEach(k=>{ all[k]=data.lists[k]; n++; });
      localStorage.setItem(LS,JSON.stringify(all));
      flash("Imported "+n+" list"+(n===1?"":"s"));

};

function fmtWhen(t){ if(!t) return ""; const d=new Date(t);
  return (Date.now()-t)<86400000 ? d.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}) : d.toLocaleDateString(); }
async function openLists(){
  const sheet=document.getElementById("sheet");
  let cloud=signedIn(), items;
  if(cloud){
    try{ const rows=await cloudList();
      items=rows.map(r=>({name:r.name,rec:r.data,army:r.army,points:r.points,count:r.count,when:Date.parse(r.updated_at)})); }
    catch(e){ cloud=false; flash("Cloud unavailable — showing device lists"); }
  }
  if(!cloud){ const all=saved();
    items=Object.keys(all).map(n=>({name:n,rec:all[n],army:all[n].army,points:all[n].points,count:all[n].count,when:all[n].savedAt})); }
  items.sort((a,b)=>(b.when||0)-(a.when||0));
  const rows = items.length ? items.map(it=>{
    const a=ARMY_MAP[it.army]||{}, crest=it.army?crestMarkup(a):"";

    </div>`;
  }).join("") : `<div class="empty">No saved lists yet — build a list and hit Save.</div>`;
  const where=cloud?`<span class="synced">☁ ${esc(CLOUD.user.email)} · synced</span>`:"stored on this device";
  const authBtn=cloud?`<button class="lbtn wide" id="lAcct">Account</button>`
                     :`<button class="lbtn wide" id="lSignin">Sign in to sync</button>`;
  sheet.innerHTML=`<button class="x" id="mx">×</button><h2>Saved Lists</h2>
    <div class="slot">${items.length} saved · ${where}</div>

  sheet.querySelectorAll("[data-del]").forEach(b=>b.onclick=async()=>{ const n=b.dataset.del;
    if(!confirm("Delete “"+n+"”?")) return;
    if(cloud){ try{ await cloudDel(n); }catch(e){ flash("Couldn't delete from cloud"); return; } }
    const a2=saved(); if(a2[n]){ delete a2[n]; localStorage.setItem(LS,JSON.stringify(a2)); }

  sheet.querySelectorAll("[data-ren]").forEach(b=>b.onclick=async()=>{ const n=b.dataset.ren;
    const v=prompt("Rename list:",n); if(v===null) return; const nm=v.trim(); if(!nm||nm===n) return;

    if(R.name===n){ R.name=nm; document.getElementById("rname").value=nm; }
    openLists(); });
  document.getElementById("lExportAll").onclick=exportAll;

// ---- shareable URL links ----
// The list (unit ids + config only, never the encrypted rules) is base64'd into the
// URL hash. A recipient still needs the passphrase to decrypt the datasheets.
function b64utf8(str){return btoa(unescape(encodeURIComponent(str)));}
function unb64utf8(b){return decodeURIComponent(escape(atob(b)));}
function shareURL(){
  const code=b64utf8(JSON.stringify(serialize()));
  return location.origin+location.pathname+"#r="+code;
}
function readSharedRoster(){
  const m=(location.hash||"").match(/[#&]r=([^&]+)/);
  if(!m) return null;
  try{return JSON.parse(unb64utf8(decodeURIComponent(m[1])));}catch(e){return null;}
}
document.getElementById("bShare").onclick=async()=>{
  if(!allEntries().length){flash("Add some units first");return;}
  const url=shareURL();
  try{ await navigator.clipboard.writeText(url); flash("🔗 Link copied to clipboard"); }
  catch(e){ prompt("Copy this share link:",url); }
};

const _hx=h=>{h=h.replace("#","");if(h.length===3)h=h.split("").map(c=>c+c).join("");

// ---- per-army datasets ----
// Asuryani ships in the main bundle (window.ENC_BUNDLE). Other armies with a
// `data` URL load + decrypt their own encrypted bundle on demand (same
// passphrase) and swap the dataset; theme-only armies just re-skin.
let LOADED_ARMY="asuryani";
async function loadArmy(id){
  if(id===LOADED_ARMY) return false;
  const a=ARMY_MAP[id]||{};
  if(id!=="asuryani" && !a.data) return false;        // theme-only army: keep current data
  let data=null;
  const cacheKey="data:"+id, cached=sessionStorage.getItem(cacheKey);
  if(cached){ data=JSON.parse(cached); }
  else if(id==="asuryani"){ data=JSON.parse(sessionStorage.getItem("data")||"null"); }
  else {
    const pw=sessionStorage.getItem("pw")||"";
    if(!window.ENC_ARMY || window.__encArmyFor!==id){ await loadScript(a.data); window.__encArmyFor=id; }
    data=await decryptBlob(window.ENC_ARMY,(window.ENC_ARMY_ITER||200000),pw);
    try{sessionStorage.setItem(cacheKey,JSON.stringify(data));}catch(e){}
  }
  if(!data) throw new Error("no data for "+id);
  window.GAME_DATA=data; initEngine(); LOADED_ARMY=id; render();
  return true;
}
// Theme + (if it has its own datasheets) swap the dataset.
async function selectArmy(id){
  applySkin(id);
  const a=ARMY_MAP[id];
  if((id==="asuryani"||a&&a.data) && id!==LOADED_ARMY){
    try{ await loadArmy(id); if(typeof flash==="function") flash(a.name+" loaded"); }
    catch(e){ if(typeof flash==="function") flash("Couldn't load "+(a?a.name:id)); }
  }
}

// Crest markup for an army: legion image when one is supplied (a.img / a.crestImg),
// otherwise the group glyph. Missing image files fall back to the glyph via onerror,
// so dropping a file into app/crests/ is all that's needed to light up a legion symbol.
function crestMarkup(a){
  const g=GROUPS[a.g]||{};
  const glyph=(a.crest||g.glyph||"✦").replace(/'/g,"");
  const src=a.img||a.crestImg;
  if(src) return `<img src="${src}" alt="" onerror="this.parentNode.textContent='${glyph}'">`;
  return glyph;
}
// ---------- Army Special Rules panel ----------
function renderArmyRules(){
  const a=ARMY_MAP[curArmy]||ARMIES[0];
  const cr=document.getElementById("arCrest"); if(cr) cr.innerHTML=crestMarkup(a);
  const nameEl=document.getElementById("arName"), body=document.getElementById("arBody");
  if(nameEl) nameEl.textContent=(a.name?a.name+" — ":"")+"Special Rules";
  const ar=(typeof G!=="undefined"&&G&&G.armyRule)||null;
  const rules=!ar?[]:(Array.isArray(ar)?ar:[ar]);
  if(!body) return;
  if(!rules.length){ body.innerHTML=`<div class="empty">No special rules recorded for this army yet.</div>`; return; }
  body.innerHTML=rules.map(r=>{
    const txt=(r.text||"").split(/\n{2,}/).filter(p=>p.trim())
      .map(p=>`<p>${paraHtml(p)}</p>`).join("");
    return `<div class="rule">${r.name?`<div class="rname">${esc(r.name)}</div>`:""}${txt}</div>`;
  }).join("");
}
function toggleArmyRules(force){
  const sec=document.getElementById("armyRules"); if(!sec) return;
  const open=(force!=null)?force:sec.hidden;
  sec.hidden=!open;

function applySkin(id){
  const a=ARMY_MAP[id]||ARMIES[0];
  const g=GROUPS[a.g], accent=a.c[0], accentD=a.c[1];
  const bg=a.bg||g.bg, bgGlow=a.bgGlow||_dark(accent,.30);
  const vars={
    "--bg":bg,"--bg-glow":bgGlow,"--panel":g.panel,"--panel2":g.panel2,
    "--line":g.line,"--edge":g.edge,"--bone":g.bone,"--muted":g.muted,"--dim":g.dim,
    "--amber":g.amber,"--red":g.red,"--green":g.green,
    "--teal":accent,"--teal-d":accentD,"--blue":accent,"--accent":accent,"--accent-d":accentD,
    "--glow":_rgba(accent,.16),"--glow-strong":_rgba(accent,.34)
  };
  const rs=document.documentElement.style;
  for(const k in vars) rs.setProperty(k,vars[k]);
  document.documentElement.setAttribute("data-skin",a.g);
  curArmy=a.id;
  try{localStorage.setItem(SKIN_KEY,a.id);}catch(e){}
  const lbl=document.getElementById("skinLabel"); if(lbl) lbl.textContent=a.name;
  const gem=document.querySelector("#skinBtn .gem");
  if(gem){gem.style.setProperty("--g",accent);gem.style.setProperty("--gd",accentD);}
  const crest=document.getElementById("crest");
  if(crest) crest.innerHTML=crestMarkup(a);
  const army=document.getElementById("armyName"); if(army) army.textContent=a.name;
  const arSec=document.getElementById("armyRules"); if(arSec && !arSec.hidden) renderArmyRules();
  const tc=document.querySelector('meta[name="theme-color"]'); if(tc) tc.setAttribute("content",bg);
  renderSkinMenu();
}
function renderSkinMenu(){
  const menu=document.getElementById("skinMenu"); if(!menu) return;
  menu.innerHTML=GROUP_ORDER.map(gk=>{
    const g=GROUPS[gk], rows=ARMIES.filter(a=>a.g===gk);
    const open=rows.some(a=>a.id===curArmy);
    return `<details class="armgrp" ${open?"open":""}>
      <summary><span class="gchev">▸</span>${g.label}<span class="gcount">${rows.length}</span></summary>
      ${rows.map(a=>`<button class="armrow" data-army="${a.id}" aria-current="${a.id===curArmy}"
        style="--g:${a.c[0]};--gd:${a.c[1]}">
        <span class="armcrest">${crestMarkup(a)}</span>
        <span class="al"><span class="an">${a.name}</span><span class="as">${a.sub}</span></span>
        ${a.id===curArmy?'<span class="ck">✓</span>':""}</button>`).join("")}
    </details>`;
  }).join("");
  menu.querySelectorAll("[data-army]").forEach(b=>b.onclick=()=>{
    selectArmy(b.dataset.army); menu.classList.remove("show");
  });
}
function initSkinPicker(){
  const btn=document.getElementById("skinBtn"), menu=document.getElementById("skinMenu");
  if(!btn||!menu) return;
  btn.onclick=e=>{e.stopPropagation();menu.classList.toggle("show");};
  document.addEventListener("click",e=>{if(!e.target.closest(".skinpick"))menu.classList.remove("show");});
  let saved="asuryani"; try{saved=localStorage.getItem(SKIN_KEY)||"asuryani";}catch(e){}
  saved=ARMY_MAP[saved]?saved:"asuryani";
  applySkin(saved);
  // if the remembered army has its own datasheets, load them (passphrase cached this tab)
  if(saved!=="asuryani" && ARMY_MAP[saved].data){ loadArmy(saved).catch(()=>{}); }
}

// ---------- boot ----------
function boot(){
  document.getElementById("gate").style.display="none";
  document.getElementById("app").style.display="flex";
  initSkinPicker();
  const main=document.querySelector("main");
  document.querySelectorAll("#tabs button").forEach(b=>b.onclick=()=>{
    document.querySelectorAll("#tabs button").forEach(x=>x.classList.remove("active"));
    b.classList.add("active");
    main.classList.toggle("show-catalog",b.dataset.tab==="catalog");
    main.classList.toggle("show-roster",b.dataset.tab==="roster");
  });
  document.getElementById("catalog").addEventListener("click",e=>{
    const add=e.target.closest("[data-add]");if(add){addUnit(add.dataset.add);e.stopPropagation();return;}
    const det=e.target.closest("[data-detail]");if(det)showDetail(det.dataset.detail);
  });
  // Army Special Rules panel toggle
  document.getElementById("armyTitle").onclick=()=>toggleArmyRules();
  document.getElementById("arClose").onclick=()=>toggleArmyRules(false);
  // Build / Play mode toggle
  document.querySelectorAll("#modeSeg button").forEach(b=>b.onclick=()=>setMode(b.dataset.mode));
  // FOC / Open list toggle
  document.querySelectorAll("#focSeg button").forEach(b=>b.onclick=()=>setFoc(b.dataset.foc==="open"));
  // World-Rune picker (craftworld sub-faction, gates Prime Advantages + Apex Detachments)
  setupWorldRuneSel();
  // overflow "⋯" actions menu (mobile)
  const moreBtn=document.getElementById("moreBtn"), actionbar=document.getElementById("actionbar");
  if(moreBtn&&actionbar){
    moreBtn.onclick=e=>{e.stopPropagation();actionbar.classList.toggle("show");};
    actionbar.addEventListener("click",()=>actionbar.classList.remove("show"));
    document.addEventListener("click",e=>{if(!e.target.closest("#actionbar,#moreBtn"))actionbar.classList.remove("show");});
  }
  // capture restore candidates BEFORE the first render (which overwrites autosave)
  const shared=readSharedRoster(), auto=readAuto();
  render();
  // priority: shared link in the URL > auto-saved working list > fresh blank
  if(shared){ loadRoster(shared); flash("Loaded shared list"); }
  else if(auto && auto.count){ loadRoster(auto); flash("Restored your working list"); }
  cloudInit();   // load Supabase SDK + restore any signed-in session (async, non-blocking)
}
// Register the offline service worker (no-op if unsupported / insecure origin).
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{}));
}
// Auto-restore a decrypted session on reload (runs after all declarations are initialised).
(function(){ const c=sessionStorage.getItem("data");
  if(c){ try{ startApp(JSON.parse(c)); }catch(e){ sessionStorage.removeItem("data"); } } })();
</script>
</body>
</html>
